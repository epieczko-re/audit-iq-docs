name: Build Documentation

on:
  push:
    branches: [main, master, 'release/**']
    paths:
      - 'src/docs/**'
      - '.asciidoctorconfig.adoc'
      - 'Makefile'
      - 'Dockerfile'
      - '.github/workflows/build-docs.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/docs/**'
      - '.asciidoctorconfig.adoc'
      - 'Makefile'
      - 'Dockerfile'
      - '.github/workflows/build-docs.yml'
  workflow_dispatch:
    inputs:
      formats:
        description: 'Output formats (comma-separated: pdf,html,docx)'
        required: false
        default: 'pdf,html,docx'

env:
  DOC_SRC: src/docs/asciidoc/auditiq-product-architecture-delivery-plan/index.adoc
  BUILD_DIR: build
  KROKI_SERVER_URL: http://kroki:8000

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: docker://asciidoctor/docker-asciidoctor:latest

    services:
      kroki:
        image: yuzutech/kroki
        env:
          KROKI_MERMAID_HOST: kroki-mermaid
        ports:
          - 8000:8000
      kroki-mermaid:
        image: yuzutech/kroki-mermaid

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install additional dependencies
        run: |
          # Install pandoc for DOCX conversion and curl for health checks
          apk add --no-cache pandoc curl

      - name: Wait for Kroki service
        run: |
          echo "Waiting for Kroki gateway..."
          for i in $(seq 1 30); do
            if curl -sf http://kroki:8000/health > /dev/null 2>&1; then
              echo "Kroki gateway is ready (attempt $i)"
              break
            fi
            echo "Attempt $i: Kroki not ready, waiting 2s..."
            sleep 2
          done
          curl -sf http://kroki:8000/health || (echo "ERROR: Kroki gateway failed to start" && exit 1)

          # Verify Mermaid rendering works end-to-end
          echo "Verifying Mermaid rendering..."
          for i in $(seq 1 15); do
            if curl -sf -o /dev/null -X POST http://kroki:8000/mermaid/svg \
              -H 'Content-Type: text/plain' \
              -d 'graph TD; A-->B;'; then
              echo "Mermaid rendering verified (attempt $i)"
              break
            fi
            echo "Attempt $i: Mermaid not ready, waiting 2s..."
            sleep 2
          done
          curl -sf -o /dev/null -X POST http://kroki:8000/mermaid/svg \
            -H 'Content-Type: text/plain' \
            -d 'graph TD; A-->B;' || (echo "ERROR: Mermaid rendering failed — check kroki-mermaid service" && exit 1)

      - name: Create build directory
        run: mkdir -p ${{ env.BUILD_DIR }}

      - name: Build HTML
        run: |
          DOC_DIR=$(dirname "${{ env.DOC_SRC }}")
          asciidoctor \
            -r asciidoctor-kroki \
            -r asciidoctor-mathematical \
            -a kroki-server-url=${{ env.KROKI_SERVER_URL }} \
            -a kroki-fetch-diagram \
            -a imagesoutdir="$DOC_DIR" \
            -a data-uri \
            -a allow-uri-read \
            -a toc=left \
            -a toclevels=3 \
            -a icons=font \
            -a source-highlighter=highlight.js \
            -D ${{ env.BUILD_DIR }} \
            -o auditiq-product-architecture-delivery-plan.html \
            ${{ env.DOC_SRC }}

      - name: Build PDF
        run: |
          DOC_DIR=$(dirname "${{ env.DOC_SRC }}")
          asciidoctor-pdf \
            -r asciidoctor-kroki \
            -r asciidoctor-mathematical \
            -a kroki-server-url=${{ env.KROKI_SERVER_URL }} \
            -a kroki-fetch-diagram \
            -a imagesoutdir="$DOC_DIR" \
            -a pdf-theme=src/docs/resources/themes/riskexec-theme.yml \
            -a pdf-fontsdir=src/docs/resources/fonts \
            -a allow-uri-read \
            -a icons=font \
            -D ${{ env.BUILD_DIR }} \
            -o auditiq-product-architecture-delivery-plan.pdf \
            ${{ env.DOC_SRC }}

      - name: Convert HTML to DOCX
        run: |
          cd ${{ env.BUILD_DIR }}
          pandoc \
            --from html \
            --to docx \
            --toc \
            --toc-depth=3 \
            -o auditiq-product-architecture-delivery-plan.docx \
            auditiq-product-architecture-delivery-plan.html

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: documentation-${{ github.sha }}
          path: |
            ${{ env.BUILD_DIR }}/*.html
            ${{ env.BUILD_DIR }}/*.pdf
            ${{ env.BUILD_DIR }}/*.docx
          retention-days: 30

  # Publish HTML to GitHub Pages on push to main/master
  deploy-pages:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: documentation-${{ github.sha }}
          path: site/

      - name: Create landing page with download links
        run: |
          cat > site/index.html << 'LANDING'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>AuditIQ — Product Architecture &amp; Delivery Plan</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: system-ui, -apple-system, sans-serif; background: #f5f6fa; color: #1a1a2e; }
              .hero { background: #002C73; color: #fff; padding: 3rem 1.5rem; text-align: center; }
              .hero h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
              .hero p { opacity: 0.85; font-size: 1.05rem; }
              .cards { display: flex; flex-wrap: wrap; gap: 1.25rem; max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
              .card { flex: 1 1 240px; background: #fff; border-radius: 8px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-decoration: none; color: inherit; transition: box-shadow 0.2s; }
              .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.14); }
              .card h2 { font-size: 1.15rem; margin-bottom: 0.4rem; color: #002C73; }
              .card p { font-size: 0.9rem; color: #555; }
              .badge { display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 4px; margin-bottom: 0.6rem; color: #fff; }
              .badge-view { background: #002C73; }
              .badge-dl { background: #FF7E2D; }
              footer { text-align: center; padding: 2rem 1rem; font-size: 0.8rem; color: #888; }
            </style>
          </head>
          <body>
            <div class="hero">
              <h1>AuditIQ Product Architecture &amp; Delivery Plan</h1>
              <p>View online or download in your preferred format</p>
            </div>
            <div class="cards">
              <a class="card" href="auditiq-product-architecture-delivery-plan.html">
                <span class="badge badge-view">VIEW</span>
                <h2>HTML Documentation</h2>
                <p>Read the full document in your browser with navigation, syntax highlighting, and diagrams.</p>
              </a>
              <a class="card" href="auditiq-product-architecture-delivery-plan.pdf" download>
                <span class="badge badge-dl">DOWNLOAD</span>
                <h2>PDF</h2>
                <p>Formatted for print and offline reading with branded styling.</p>
              </a>
              <a class="card" href="auditiq-product-architecture-delivery-plan.docx" download>
                <span class="badge badge-dl">DOWNLOAD</span>
                <h2>Word (DOCX)</h2>
                <p>Editable document for collaboration and review workflows.</p>
              </a>
            </div>
            <footer>Built automatically from source on each push to main.</footer>
          </body>
          </html>
          LANDING

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Create a release with PDF/DOCX when a tag is pushed
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: documentation-${{ github.sha }}
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.pdf
            release-assets/*.docx
          generate_release_notes: true
