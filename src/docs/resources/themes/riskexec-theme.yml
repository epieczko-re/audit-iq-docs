# =============================================================================
# RiskExec PDF Theme Configuration
# =============================================================================
# Font paths are relative to the pdf-fontsdir setting

extends:
  - default

# Brand Colors
brand:
  riskexec_blue: '002C73'           # Primary brand blue
  riskexec_section_blue: '113D89'   # Section header blue
  riskexec_orange: 'FF7E2D'         # Primary brand orange
  riskexec_blue_light: '5271b6'     # Light blue for accents
  riskexec_blue_lighter: '728bc2'   # Lighter blue for subtle elements
  riskexec_orange_light: 'FFAA34'   # Light orange for accents
  riskexec_gray_dark: '333333'      # Dark gray for body text
  riskexec_gray_medium: '666666'    # Medium gray for secondary text
  riskexec_gray_light: 'E7EBF4'     # Light gray for backgrounds
  black: '000000'                   # Black for lines

# Font catalog with paths relative to pdf-fontsdir
font:
  catalog:
    # Barlow font family
    Barlow:
      normal: barlow/Barlow-Regular.ttf
      bold: barlow/Barlow-Bold.ttf
      italic: barlow/Barlow-Italic.ttf
      bold_italic: barlow/Barlow-BoldItalic.ttf
    BarlowMedium:
      normal: barlow/Barlow-Medium.ttf
      bold: barlow/Barlow-SemiBold.ttf
      italic: barlow/Barlow-MediumItalic.ttf
      bold_italic: barlow/Barlow-SemiBoldItalic.ttf

# Page configuration
page:
  background_color: ffffff
  layout: portrait
  margin: [0.75in, 1in, 0.75in, 0.75in]
  size: Letter

# Base text styling - using Barlow as primary font
base:
  align: left
  font_color: $brand_riskexec_gray_dark
  font_family: Barlow
  font_size: 11
  line_height_length: 17
  line_height: $base_line_height_length / $base_font_size

# Link styling - using brand blue
link:
  font_color: $brand_riskexec_blue

# Literal text (code) styling
literal:
  font_family: Courier
  font_size: 10
  font_color: $brand_riskexec_blue
  background_color: f8f9fa

# Heading configuration with brand colors
heading:
  align: left
  font_color: $brand_riskexec_gray_dark
  font_family: Barlow
  font_style: bold
  line_height: 1.2
  margin_top: $base_font_size * 1.5
  margin_bottom: $base_font_size * 0.8
  chapter_break_before: always
  h1:
    font_size: 24
    font_style: bold
    font_color: $brand_riskexec_blue
  h2:
    font_size: 20
    font_style: bold
    font_color: $brand_riskexec_blue
  h3:
    font_size: 16
    font_style: bold
    font_color: $brand_riskexec_section_blue
  h4:
    font_size: 14
    font_style: bold
    font_color: $brand_riskexec_section_blue
  h5:
    font_size: 12
    font_style: bold
    font_color: $brand_riskexec_gray_dark
  h6:
    font_size: 11
    font_style: bold
    font_color: $brand_riskexec_gray_dark

# Chapter label (to remove "Chapter" prefix)
chapter:
  chapter_label: ''

# Title page configuration with brand colors
title_page:
  align: left
  logo:
    image: image:../images/logos/RiskExec_Logo_RGB.png[pdfwidth=50%]
    align: left
    top: 30%
  title:
    font_family: Barlow
    font_size: 28
    font_style: bold
    font_color: $brand_riskexec_blue
    line_height: 1.2
    margin_top: 30
    align: center
  subtitle:
    font_family: Barlow
    font_size: 18
    font_style: normal
    font_color: $brand_riskexec_gray_dark
    line_height: 1.3
    margin_top: 12
    align: center
  # Document series information
  series:
    content: 'Product Strategy Series'
    font_family: Barlow
    font_size: 14
    font_style: normal
    font_color: $brand_riskexec_gray_medium
    margin_top: 40
    align: center
  authors:
    font_family: Barlow
    font_size: 14
    font_color: $brand_riskexec_gray_medium
    margin_top: 20
    align: center
  revision:
    margin_top: 20
    font_family: Barlow
    font_size: 12
    font_color: $brand_riskexec_gray_medium
    align: center

# Header configuration with brand colors
header:
  font_family: Barlow
  font_size: 9
  font_color: $brand_riskexec_gray_medium
  border_color: $brand_black
  border_width: 0
  height: 0.75in
  line_height: 1
  vertical_align: middle
  recto:
    right:
      content: '*{document-title}*'
    left:
      content: '*_Proprietary & Confidential_*'
  verso:
    left:
      content: '*{document-title}*'
    right:
      content: '*_Proprietary & Confidential_*'

# Footer configuration with brand colors
footer:
  font_family: Barlow
  font_size: 9
  font_color: $brand_riskexec_gray_medium
  border_color: $brand_riskexec_gray_medium
  border_width: 0.5
  height: 0.75in
  #line_height: 1
  vertical_align: top
  recto:
    right:
      content: '*© {docyear} RiskExec, Inc.*   |   *{page-number}*'
    center:
      content: '*_Internal Use Only_*'
    left:
      content: '*{chapter-title}*'
  verso:
    left:
      content: '*{page-number}*    |   *© {docyear} RiskExec, Inc.*'
    center:
      content: '*_Internal Use Only_*'
    right:
      content: '*{chapter-title}*'

# Table of contents styling with brand colors
toc:
  font_family: Barlow
  font_size: 11
  line_height: 1.4
  dot_leader:
    font_color: $brand_riskexec_blue_lighter
    levels: 2 3
  title:
    font_family: Barlow
    font_size: 18
    font_style: bold
    font_color: $brand_riskexec_blue
  h2:
    font_style: bold
    font_color: $brand_riskexec_blue
  h3:
    font_style: normal
    font_color: $brand_riskexec_gray_dark

# Block styling
block:
  margin_top: 0
  margin_bottom: $base_font_size * 1.15

# Paragraph styling
prose:
  margin_top: 0
  margin_bottom: $base_font_size * 1.15
  text_indent: 0

# List styling
list:
  indent: $base_font_size * 1.8
  item_spacing: $base_font_size * 0.5
  font_family: Barlow

# Table styling with brand colors
table:
  background_color: ffffff
  border_color: $brand_riskexec_blue_lighter
  border_width: 0.5
  cell_padding: 3
  font_family: Barlow
  head:
    background_color: $brand_riskexec_gray_light
    font_family: Barlow
    font_style: bold
    font_color: $brand_riskexec_blue
    border_bottom_width: 2
    border_bottom_color: $brand_riskexec_blue_light
  body:
    stripe_background_color: fafbfc
  foot:
    background_color: $brand_riskexec_gray_light
    font_style: bold

# Admonition styling with brand colors
admonition:
  column_rule_color: $brand_riskexec_blue_lighter
  column_rule_width: 1
  padding: [12, 15, 12, 15]
  font_family: Barlow
  label:
    font_style: bold
    text_transform: uppercase
  icon:
    note:
      name: fa-info-circle
      stroke_color: $brand_riskexec_blue_light
      size: 24
    tip:
      name: fa-lightbulb-o
      stroke_color: $brand_riskexec_orange_light
      size: 24
    warning:
      name: fa-exclamation-triangle
      stroke_color: $brand_riskexec_orange
      size: 24
    important:
      name: fa-exclamation-circle
      stroke_color: $brand_riskexec_orange
      size: 24
    caution:
      name: fa-hand-stop-o
      stroke_color: $brand_riskexec_orange
      size: 24

# Code block styling with brand colors
code:
  background_color: fafbfc
  border_color: $brand_riskexec_blue_lighter
  border_radius: 3
  border_width: 0.5
  font_family: Courier
  font_size: 10
  line_height: 1.25
  padding: 8

# Blockquote styling with brand colors
blockquote:
  border_left_width: 4
  border_left_color: $brand_riskexec_orange
  padding: [6, 15, 6, 20]
  font_family: Barlow
  font_style: italic
  font_size: $base_font_size * 1.05
  cite:
    font_family: Barlow
    font_color: $brand_riskexec_gray_medium
    font_size: $base_font_size * 0.9

# Sidebar styling with brand colors
sidebar:
  background_color: $brand_riskexec_gray_light
  border_color: $brand_riskexec_blue_lighter
  border_radius: 3
  border_width: 1
  padding: 12
  font_family: Barlow
  title:
    align: center
    font_color: $brand_riskexec_blue
    font_family: Barlow
    font_size: 13
    font_style: bold

# Image styling
image:
  align: left

# Thematic break styling with brand colors
thematic_break:
  border_color: $brand_riskexec_blue_lighter
  border_style: solid
  border_width: 0.5
  margin_top: $base_font_size * 1.5
  margin_bottom: $base_font_size * 1.5

# Caption styling with brand colors
caption:
  align: left
  font_family: Barlow
  font_size: $base_font_size * 0.95
  font_style: italic
  font_color: $brand_riskexec_gray_medium
  margin_inside: $base_font_size * 0.5
  margin_outside: 0

# Footnotes with brand colors
footnotes:
  font_size: $base_font_size * 0.85
  font_color: $brand_riskexec_gray_medium

# Running content (variables available in headers/footers)
running_content:
  start_at: toc

# Section breaks
section:
  break_before: always
